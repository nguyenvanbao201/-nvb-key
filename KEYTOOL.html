<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KEY TOOL</title>
<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
    padding-top:50px;
}
button{
    padding:12px 20px;
    font-size:18px;
}
#key{
    margin-top:20px;
    font-size:25px;
    color:lime;
}
</style>
</head>
<body>

<h1>KEY TOOL</h1>

<button onclick="getKey()">Lấy Key</button>

<div id="key"></div>

<script>
function randomKey(){
    let chars="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";
    let key="NVB-";

    for(let i=0;i<10;i++){
        key+=chars.charAt(
        Math.floor(Math.random()*chars.length));
    }

    return key;
}

function getKey(){

    let lastTime = localStorage.getItem("lastTime");

    if(lastTime){

        let now = Date.now();

        let diff = now - parseInt(lastTime);

        if(diff < 86400000){

            let remain =
            Math.ceil((86400000-diff)/3600000);

            alert(
            "Bạn đã lấy key hôm nay.\nCòn "
            +remain+
            " giờ nữa mới lấy được.");

            return;
        }
    }

    let key = randomKey();

    localStorage.setItem("key",key);
    localStorage.setItem("lastTime",Date.now());

    document.getElementById("key").innerHTML=key;
}
</script>

</body>
</html>
