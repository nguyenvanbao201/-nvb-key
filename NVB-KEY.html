<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NVB KEY SYSTEM</title>
<style>
body{
    background:#111;
    color:white;
    text-align:center;
    font-family:sans-serif;
    padding-top:50px;
}
button{
    padding:12px 20px;
    font-size:18px;
}
#result{
    margin-top:20px;
    font-size:20px;
    color:#00ff00;
}
</style>
</head>
<body>

<h1>KEY</h1>

<button onclick="getKey()">LẤY KEY</button>

<div id="result"></div>

<script>

const SUPABASE_URL =
"https://esepmwzouzbrstrxumjv.supabase.co";

const SUPABASE_KEY =
"sb_publishable_DMK8YmKHe0SLe5nhtLN_5A_qOdMJ9AA";

function randomKey() {
    const chars =
    "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789";

    let key = "";

    for(let i=0;i<12;i++){
        key += chars.charAt(
        Math.floor(Math.random()*chars.length)
        );
    }

    return key;
}
async function getKey(){

    let deviceId = localStorage.getItem("device_id");

    if(!deviceId){
        deviceId = crypto.randomUUID();
        localStorage.setItem("device_id", deviceId);
    }

    let check = await fetch(
    `${SUPABASE_URL}/rest/v1/device_keys?device_id=eq.${deviceId}`,
    {
        headers:{
            apikey:SUPABASE_KEY,
            Authorization:`Bearer ${SUPABASE_KEY}`
        }
    });

    let data = await check.json();

    if(data.length > 0){

        let created = new Date(data[0].created_at);
        let now = new Date();

        let sameDay =
        created.getDate() === now.getDate() &&
        created.getMonth() === now.getMonth() &&
        created.getFullYear() === now.getFullYear();

        if(sameDay){

            document.getElementById("result").innerHTML =
            "❌ Hôm nay bạn đã lấy key rồi<br><br><b>" +
            data[0].key_code +
            "</b>";

            return;
        }

        let newKey = randomKey();

        let exp = new Date();
        exp.setHours(exp.getHours()+24);

        await fetch(
        `${SUPABASE_URL}/rest/v1/device_keys?device_id=eq.${deviceId}`,
        {
            method:"PATCH",
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:`Bearer ${SUPABASE_KEY}`,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                key_code:newKey,
                expires_at:exp.toISOString()
            })
        });

        document.getElementById("result").innerHTML =
        "✅ KEY MỚI<br><br><b>"+newKey+"</b>";

        return;
    }

    let key = randomKey();

    let exp = new Date();
    exp.setHours(exp.getHours()+24);

    await fetch(
    `${SUPABASE_URL}/rest/v1/device_keys`,
    {
        method:"POST",
        headers:{
            apikey:SUPABASE_KEY,
            Authorization:`Bearer ${SUPABASE_KEY}`,
            "Content-Type":"application/json"
        },
        body:JSON.stringify({
            device_id:deviceId,
            key_code:key,
            expires_at:exp.toISOString()
        })
    });

    document.getElementById("result").innerHTML =
    "✅ KEY CỦA BẠN<br><br><b>"+key+"</b>";
                }
